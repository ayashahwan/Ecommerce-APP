  <div id="seller-page" class="hidden">
    <header style="background-color: #e3eefe;">
      <button id="switch-to-buyer">BUYER</button>
      <h3 style="padding-right: 900px;">Sellers Section</h3>
    </header>
    <button id="add-product">Add New Product</button>
    <main>
      <table id="product-table">
        <thead>
          <tr>
            <th> Image </th>
            <th> Name </th>
            <th> Details </th>
            <th> Price </th>
            <th> Category </th>
            <th> Actions </th>
          </tr>
        </thead>
        <tbody id="product-list">
          <tr>
              <td><img src="img/img12-removebg-preview.png" class="table-img"></td>
              <td>تيشرت قطني</td>
              <td>وصف بسيط هنا...</td>
              <td>25$</td>
              <td>ملابس</td>
              <td class="actions-btns">
                <button class="edit-btn"><i class="fas fa-edit"></i></button>
                <button class="delete-btn"><i class="fas fa-trash"></i></button>
              </td>
          </tr>
          
        </tbody>
      </table>

      <div id="add-item" class="item-hidden">
        <h3>Add Product</h3>
        <form class="form">
          <input type="url" id="product-image" placeholder="image url">
          <input type="text" id="product-name" placeholder="product name" required>
          <textarea id="product-details" placeholder="details"></textarea>
          <input type="number" id="product-price" placeholder="product price" required>
          <label for="product-category">Category : </label>
          <select id="product-category">
            <option>Clothes</option>
            <option>Jewelry</option>
            <option>Electronics</option>
          </select>
          <button type="submit"> Add Item </button>
        </form>
      </div>
    </main>
